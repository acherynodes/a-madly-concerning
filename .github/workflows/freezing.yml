name: freezing
on:
  push:
    branches: [ "main" ]

jobs:
    as:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: as
          run: |
            npm install
            timeout 328m node freezing.js
  
