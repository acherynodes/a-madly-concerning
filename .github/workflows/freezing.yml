name: freezing
on:
  push:
    branches: [ "main" ]

jobs:
    redesign_amidst_though:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: redesign_amidst_though
          run: |
            npm install
