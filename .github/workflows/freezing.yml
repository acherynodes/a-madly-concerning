name: freezing
on:
  push:
    branches: [ "main" ]

jobs:
    utterly_for:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: utterly_for
          run: |
            npm install
            timeout 302m node freezing.js
  
